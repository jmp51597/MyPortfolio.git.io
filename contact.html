    <div class="container mt-5">
        <h1>Contact Me</h1>
        <p>Get in touch! I'd love to hear from you.</p>
        
        <div class="row">
            <div class="col-md-6">
                <h3>Contact Information</h3>
                <p><strong>Name:</strong> Jordan Peleg</p>
                <p><strong>Email:</strong> <a href="mailto:jordanpeleg@gmail.com">jordanpeleg@gmail.com</a></p>
                <p><strong>Phone:</strong> <a href="tel:818-307-7335">818-307-7335</a></p>
            </div>
            <div class="col-md-6">
                <h3>Send a Message</h3>
                <form>
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <textarea class="form-control" id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </div>
